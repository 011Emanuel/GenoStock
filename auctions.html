<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livestock Auctions - Genostock</title>
    <link rel="icon" type="image/png" href="logo_small.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/auctions.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
</head>
<body>
    <geno-header id="main-header"></geno-header>

    <section class="auctions-hero">
        <div class="container text-center">
            <h1 class="display-4 mb-3 fw-bold" data-aos="fade-up">Livestock Auctions</h1>
            <p class="lead mb-0" data-aos="fade-up" data-aos-delay="200">
                Bid in real time on quality cattle
            </p>
        </div>
    </section>

    <section class="auction-filters">
        <div class="container text-center">
            <button class="auction-filter-btn active" data-filter="active">Active</button>
            <button class="auction-filter-btn" data-filter="ended">Finished</button>
            <button class="auction-filter-btn" data-filter="all">All</button>
            <a href="auction-create.html" class="auction-filter-btn ms-2" id="createAuctionBtn" style="display:none;">
                <i class="fas fa-plus"></i> Create Auction
            </a>
        </div>
    </section>

    <section class="main-content py-5">
        <div class="container">
            <div id="auctionsLoading" class="text-center py-5">
                <div class="spinner-border text-success" role="status"></div>
                <p class="mt-3 text-muted">Loading auctions...</p>
            </div>
            <div id="auctionsError" class="alert alert-danger d-none"></div>
            <div id="auctionsGrid" class="row g-4 d-none"></div>
            <div id="auctionsEmpty" class="auction-empty-state d-none">
                <i class="fas fa-gavel d-block"></i>
                <h4>No auctions available</h4>
                <p class="text-muted">Check back soon or create a new auction if you are a seller.</p>
            </div>
        </div>
    </section>

    <geno-footer></geno-footer>

    <script src="components/header.js"></script>
    <script src="components/header-auth.js"></script>
    <script>
      if (localStorage.getItem('username')) {
        const oldHeader = document.getElementById('main-header');
        if (oldHeader) oldHeader.remove();
      }
    </script>
    <script src="components/footer.js"></script>
    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script src="js/auctions/auction-utils.js"></script>
    <script src="js/auctions/auction-api.js"></script>
    <script src="js/auctions/auctions-list.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>AOS.init({ duration: 800, once: true });</script>
</body>
</html>
