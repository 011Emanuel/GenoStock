<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subastas de Ganado - Genostock</title>
    <link rel="icon" type="image/png" href="logo_small.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/auctions.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
</head>
<body>
    <geno-header id="main-header"></geno-header>

    <section class="auctions-hero">
        <div class="container text-center">
            <h1 class="display-4 mb-3 fw-bold" data-aos="fade-up">Subastas de Ganado</h1>
            <p class="lead mb-0" data-aos="fade-up" data-aos-delay="200">
                Puja en tiempo real por ganado de calidad

    <!-- SECCIÓN 1: AGENDA -->
    <section id="seccion-agenda" class="auction-section auction-agenda-section">
        <div class="container">
            <div class="auction-section-header text-center" data-aos="fade-up">
                <span class="auction-section-num">01</span>
                <span class="auction-section-label"><i class="far fa-calendar-alt"></i> Agenda</span>
                <h2 class="auction-section-title">Próximas subastas</h2>
                <p class="auction-section-subtitle text-muted">
                    Consulta los días y horarios de nuestros remates en línea
                </p>
            </div>
            </p>
    <section class="auction-filters">
        <div class="container text-center">
            <button class="auction-filter-btn active" data-filter="active">Activas</button>
            <button class="auction-filter-btn" data-filter="ended">Finalizadas</button>
            <button class="auction-filter-btn" data-filter="all">Todas</button>
            <a href="auction-create.html" class="auction-filter-btn ms-2" id="createAuctionBtn" style="display:none;">
                <i class="fas fa-plus"></i> Crear subasta
            </a>
                </div>
                <div id="agendaEvents" class="agenda-events-list"></div>
            </div>
        </div>
    </section>

    <!-- SECCIÓN 2: LIVE AUCTIONS -->
    <section id="seccion-live" class="auction-section auction-live-section">
        <div class="container">
    <section class="main-content py-5">
        <div class="container">
            <div id="auctionsLoading" class="text-center py-5">
                <div class="spinner-border text-success" role="status"></div>
                <p class="mt-3 text-muted">Cargando subastas...</p>
            </div>
            <div id="auctionsError" class="alert alert-danger d-none"></div>
            <div id="auctionsGrid" class="row g-4 d-none"></div>
            <div id="auctionsEmpty" class="auction-empty-state d-none">
                <i class="fas fa-gavel d-block"></i>
                <h4>No hay subastas disponibles</h4>
                <p class="text-muted">Vuelve pronto o crea una nueva subasta si eres vendedor.</p>
            </div>
        </div>
    </section>

    <geno-footer></geno-footer>

    <script src="components/header.js"></script>
    <script src="components/header-auth.js"></script>
    <script>
      if (localStorage.getItem('username')) {
        const oldHeader = document.getElementById('main-header');
        if (oldHeader) oldHeader.remove();
      }
    </script>
    <script src="components/footer.js"></script>
    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script src="js/auctions/auction-utils.js"></script>
    <script src="js/auctions/auction-api.js"></script>
    <script src="js/auctions/auctions-list.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>AOS.init({ duration: 800, once: true });</script>
</body>
</html>
