<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Auction - Genostock</title>
    <link rel="icon" type="image/png" href="logo_small.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/auctions.css">
</head>
<body>
    <geno-header id="main-header"></geno-header>

    <section class="main-content py-5" style="padding-top: 120px !important;">
        <div class="container" style="max-width: 720px;">
            <nav aria-label="breadcrumb" class="mb-4">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="auctions.html">Auctions</a></li>
                    <li class="breadcrumb-item active">Create auction</li>
                </ol>
            </nav>

            <h2 class="fw-bold mb-4"><i class="fas fa-plus-circle text-success"></i> New auction</h2>

            <div id="authBlock" class="alert alert-warning d-none">
                You must <a href="login.html">log in</a> as a seller (rancher) to create auctions.
            </div>

            <div id="roleBlock" class="alert alert-warning d-none">
                Only sellers can create auctions. Traders can participate by placing bids.
            </div>

            <form id="createAuctionForm" class="card p-4 d-none">
                <div class="mb-3">
                    <label for="title" class="form-label">Title *</label>
                    <input type="text" class="form-control" id="title" required maxlength="200"
                           placeholder="e.g. Premium Brahman Bull — Lot #101">
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label">Description *</label>
                    <textarea class="form-control" id="description" rows="4" required
                              placeholder="Describe the livestock, weight, breed, location, certificates..."></textarea>
                </div>

                <div class="mb-3">
                    <label for="startingPrice" class="form-label">Starting price (USD) *</label>
                    <div class="input-group">
                        <span class="input-group-text">$</span>
                        <input type="number" class="form-control" id="startingPrice" step="0.01" min="1" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="endsAt" class="form-label">End date and time *</label>
                    <input type="datetime-local" class="form-control" id="endsAt" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Images (URLs)</label>
                    <div id="imageUrlList">
                        <div class="input-group mb-2">
                            <input type="url" class="form-control image-url-input" placeholder="https://...">
                            <button type="button" class="btn btn-outline-secondary remove-image-btn" style="display:none;">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    </div>
                    <button type="button" class="btn btn-sm btn-outline-success" id="addImageBtn">
                        <i class="fas fa-plus"></i> Add another image
                    </button>
                    <div id="imagePreview" class="image-preview-grid"></div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-dark-green flex-grow-1" id="submitBtn">
                        <i class="fas fa-gavel"></i> Publish auction
                    </button>
                    <a href="auctions.html" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </section>

    <geno-footer></geno-footer>

    <script src="components/header.js"></script>
    <script src="components/header-auth.js"></script>
    <script>
      if (localStorage.getItem('username')) {
        const oldHeader = document.getElementById('main-header');
        if (oldHeader) oldHeader.remove();
      }
    </script>
    <script src="components/footer.js"></script>
    <script src="js/auctions/auction-utils.js"></script>
    <script src="js/auctions/auction-api.js"></script>
    <script src="js/auctions/auction-create.js"></script>
</body>
</html>
